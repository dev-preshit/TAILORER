{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stitch{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="auth-body">
    <div class="auth-screen">
        <div class="auth-panel-dark">
            <div class="auth-brand">
                <span class="auth-brand-mark">Stitch</span>
                <span class="auth-brand-sub">order ledger</span>
            </div>

            <div class="auth-tape" aria-hidden="true">
                <svg width="36" height="260" viewBox="0 0 36 260">
                    <line x1="6" y1="0" x2="6" y2="260" class="tape-rail"/>
                    <g class="tape-ticks">
                        <line x1="6" y1="10" x2="18" y2="10"/>
                        <line x1="6" y1="34" x2="14" y2="34"/>
                        <line x1="6" y1="58" x2="14" y2="58"/>
                        <line x1="6" y1="82" x2="14" y2="82"/>
                        <line x1="6" y1="106" x2="18" y2="106"/>
                        <line x1="6" y1="130" x2="14" y2="130"/>
                        <line x1="6" y1="154" x2="14" y2="154"/>
                        <line x1="6" y1="178" x2="14" y2="178"/>
                        <line x1="6" y1="202" x2="18" y2="202"/>
                        <line x1="6" y1="226" x2="14" y2="226"/>
                        <line x1="6" y1="250" x2="14" y2="250"/>
                    </g>
                    <text x="22" y="13" class="tape-num">0</text>
                    <text x="22" y="109" class="tape-num">16</text>
                    <text x="22" y="205" class="tape-num">32</text>
                </svg>
            </div>

            <p class="auth-tagline">{% block tagline %}Every measurement, every order, kept to the centimetre.{% endblock %}</p>
        </div>

        <div class="auth-panel-light">
            <div class="auth-form-wrap">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
